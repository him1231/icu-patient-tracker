<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ICU Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header><h1>Admin</h1><a href="index.html">Back</a></header>
  <main>
    <section>
      <h2>MMRC Items</h2>
      <div id="mmrcList"></div>
      <button id="addMmrc">Add Item</button>
    </section>
    <section>
      <h2>Exercise Options</h2>
      <div id="exerciseList"></div>
      <button id="addExercise">Add Option</button>
    </section>
    <section>
      <h2>Specialty Options</h2>
      <div id="specialtyList"></div>
      <button id="addSpecialty">Add Specialty</button>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = { apiKey: "REPLACE_ME", authDomain: "REPLACE_ME", projectId: "REPLACE_ME", storageBucket: "REPLACE_ME", messagingSenderId: "REPLACE_ME", appId: "REPLACE_ME" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadAll(){
      const mm = (await db.doc('config/mmrcItems').get()).data();
      const ex = (await db.doc('config/exerciseOptions').get()).data();
      const sp = (await db.doc('config/specialtyOptions').get()).data();
      renderList('mmrcList', mm?.items||[], 'mmrc');
      renderList('exerciseList', ex?.options||[], 'exercise');
      renderList('specialtyList', sp?.options||[], 'specialty');
    }

    function renderList(elId, items, kind){
      const el = document.getElementById(elId);
      el.innerHTML='';
      items.forEach((it,i)=>{
        const row = document.createElement('div');
        row.innerHTML = `<input value="${it.label}" data-index="${i}" data-kind="${kind}"> <button data-action="save" data-index="${i}" data-kind="${kind}">Save</button> <button data-action="del" data-index="${i}" data-kind="${kind}">Delete</button>`;
        el.appendChild(row);
      })
    }

    document.getElementById('addMmrc').addEventListener('click', async ()=>{
      const doc = await db.doc('config/mmrcItems').get();
      const items = doc.exists?doc.data().items:[];
      items.push({id: items.length+1, label: 'New Item'});
      await db.doc('config/mmrcItems').set({items});
      await loadAll();
    });
    document.getElementById('addExercise').addEventListener('click', async ()=>{
      const doc = await db.doc('config/exerciseOptions').get();
      const items = doc.exists?doc.data().options:[];
      items.push({id: items.length+1, label: 'New Option'});
      await db.doc('config/exerciseOptions').set({options: items});
      await loadAll();
    });
    document.getElementById('addSpecialty').addEventListener('click', async ()=>{
      const doc = await db.doc('config/specialtyOptions').get();
      const items = doc.exists?doc.data().options:[];
      items.push({id: items.length+1, label: 'New Specialty'});
      await db.doc('config/specialtyOptions').set({options: items});
      await loadAll();
    });

    document.addEventListener('click', async (e)=>{
      const btn = e.target;
      if(btn.dataset && btn.dataset.action){
        const kind = btn.dataset.kind; const idx = parseInt(btn.dataset.index);
        if(btn.dataset.action==='save'){
          const input = btn.parentElement.querySelector('input');
          const val = input.value;
          await saveConfigItem(kind, idx, val);
          await loadAll();
        } else if(btn.dataset.action==='del'){
          await deleteConfigItem(kind, idx);
          await loadAll();
        }
      }
    });

    async function saveConfigItem(kind, idx, val){
      const path = kind==='mmrc'?'config/mmrcItems': kind==='exercise'?'config/exerciseOptions':'config/specialtyOptions';
      const doc = await db.doc(path).get();
      const data = doc.exists?doc.data(): (kind==='mmrc'?{items:[]}:{options:[]});
      if(kind==='mmrc') data.items[idx].label = val; else if(kind==='exercise') data.options[idx].label = val; else data.options[idx].label = val;
      await db.doc(path).set(data);
    }
    async function deleteConfigItem(kind, idx){
      const path = kind==='mmrc'?'config/mmrcItems': kind==='exercise'?'config/exerciseOptions':'config/specialtyOptions';
      const doc = await db.doc(path).get();
      const data = doc.exists?doc.data(): (kind==='mmrc'?{items:[]}:{options:[]});
      if(kind==='mmrc') data.items.splice(idx,1); else data.options.splice(idx,1);
      await db.doc(path).set(data);
    }

    loadAll();
  </script>
</body>
</html>
